name: Update gdebenz data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update data
        run: |
          python outputs/gdebenz_parser.py \
            --all \
            --with-status \
            --with-real-count \
            --with-districts \
            --workers 24 \
            --insecure-ssl

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/gdebenz_unified_status_realcount_districts.csv outputs/gdebenz_unified_status_realcount_districts.json
          git diff --cached --quiet || git commit -m "Update gdebenz data"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs

      - name: Deploy dashboard
        id: deployment
        uses: actions/deploy-pages@v4
